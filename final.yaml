# profile-title: Dwark VPN
# profile-update-interval: 1

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: true

external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

proxy-providers:
  dwark-services:
    type: http
    url: "https://raw.githubusercontent.com/kls-air/dwarkVVDS/refs/heads/main/proxies.yaml"
    interval: 3600
    path: ./providers/dwark-services.yaml
    health-check:
      enable: true
      lazy: false
      interval: 3600
      timeout: 5000
      url: "https://www.gstatic.com/generate_204"

proxy-groups:
  - name: "Dwark | Авто подключение 🔥"
    type: url-test
    use:
      - dwark-services
    url: "https://www.gstatic.com/generate_204"
    interval: 3600
    timeout: 5000
    tolerance: 20
    lazy: false
    hidden: false

rules:
  - MATCH,Dwark | Авто подключение 🔥
